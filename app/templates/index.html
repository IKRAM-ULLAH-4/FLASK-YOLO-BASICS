<!DOCTYPE html>
<html>
<head>

    <title>YOLO Dashboard</title>

    <style>

        body{
            font-family: Arial;
            text-align:center;
            margin-top:30px;
        }

        img{
            max-width:700px;
            border:1px solid #ccc;
            margin-top:20px;
        }

        table{
            margin:auto;
            margin-top:20px;
            border-collapse:collapse;
        }

        th,td{
            border:1px solid black;
            padding:10px;
        }

    </style>

</head>
<body>

<h1>YOLO Object Detection Dashboard</h1>

<form method="POST" enctype="multipart/form-data">

    <input type="file" name="image" required>

    <button type="submit">
        Detect
    </button>

</form>

{% if result_image %}

    <h2>Detection Result</h2>

    <img src="{{ url_for('static', filename=result_image) }}">

    <h2>Detected Objects</h2>

    <table>

        <tr>
            <th>Object</th>
            <th>Confidence</th>
        </tr>

        {% for d in detections %}

        <tr>
            <td>{{ d.class }}</td>
            <td>{{ d.confidence }}</td>
        </tr>

        {% endfor %}

    </table>

{% endif %}

</body>
</html>
